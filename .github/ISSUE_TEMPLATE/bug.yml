name: Bug
description: Something is broken — actual behaviour does not match intent
title: "[Bug] "
labels: ["type:bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One or two sentences describing what is wrong.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: The minimal sequence of actions that reliably triggers the bug.
      value: |
        1.
        2.
        3.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
      description: Include error messages, stack traces, screenshots if relevant.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, app version, relevant config (provider, model, instruments in view, etc.)
      value: |
        - OS:
        - App version:
        - Provider / model:
  - type: textarea
    id: notes
    attributes:
      label: Investigation notes
      description: Anything you've already ruled out, suspected root causes, or related issues.
