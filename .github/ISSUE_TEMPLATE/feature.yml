name: Feature
description: A new capability or a meaningful enhancement to existing behaviour
title: "[Feature] "
labels: ["type:feature"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user or system problem does this solve? Why does it matter now? Avoid jumping straight to the solution.
      placeholder: When the user does X they hit Y, which means Z.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: How do you want to solve it? Sketch the approach, the affected files or modules, and any tradeoffs.
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: Concrete, testable checkboxes. The work is done when every box can be ticked.
      value: |
        - [ ]
        - [ ]
        - [ ]
    validations:
      required: true
  - type: textarea
    id: open-decisions
    attributes:
      label: Open decisions
      description: Anything that needs a call before implementation can start. Resolve in the issue thread.
      value: |
        - [ ]
  - type: textarea
    id: out-of-scope
    attributes:
      label: Out of scope
      description: What this issue deliberately does NOT cover. Helps prevent scope creep in review.
  - type: textarea
    id: references
    attributes:
      label: References
      description: ADRs, docs, prior issues, external links.
