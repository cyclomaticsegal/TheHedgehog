[workspace]
members = ["cargo:."]

# Config for 'dist'
[dist]
# The preferred dist version to use in CI (Cargo.toml SemVer syntax)
cargo-dist-version = "0.31.0"
# CI backends to support
ci = "github"
# The installers to generate for each app
installers = []
# Target platforms to build apps for (Rust target-triple syntax)
# Three-target list per the Preview 0.1 release pipeline ticket (#1):
#   - macOS aarch64 (Apple Silicon)
#   - macOS x86_64 (Intel)
#   - Linux x86_64 glibc
#   - Windows x86_64 MSVC
# Deliberately NOT building: Linux aarch64, Linux musl. Documented in the
# release notes so users on unsupported platforms know up front.
targets = ["aarch64-apple-darwin", "x86_64-apple-darwin", "x86_64-unknown-linux-gnu", "x86_64-pc-windows-msvc"]
# Where to host releases
hosting = "github"
# Extra files to include alongside the binary in every release archive.
# .env.example                  — API key template the user copies to .env
# INSTALL.txt                   — first-run instructions for the unsigned binary flow
# LICENSE                       — root MIT license + vendor carve-outs
# THIRD-PARTY-LICENSES.html     — generated by `cargo about generate about.hbs -o THIRD-PARTY-LICENSES.html`
#                                 (regenerate before each release tag if dependencies have changed)
# README.md is auto-included by default.
include = [".env.example", "INSTALL.txt", "LICENSE", "THIRD-PARTY-LICENSES.html"]
